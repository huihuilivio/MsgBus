name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure --timeout 30

      - name: Benchmark
        if: matrix.build_type == 'Release'
        run: ./build/tests/Release/msgbus_bench.exe | Tee-Object -FilePath benchmark-windows.txt

      - name: Upload benchmark results
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-windows
          path: benchmark-windows.txt

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Release, Debug]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++-13
          else
            sudo apt-get install -y clang-17
          fi

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Benchmark
        if: matrix.build_type == 'Release'
        run: |
          ./build/tests/msgbus_bench | tee benchmark-${{ matrix.compiler }}.txt

      - name: Upload benchmark results
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-linux-${{ matrix.compiler }}
          path: benchmark-${{ matrix.compiler }}.txt

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j $(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Benchmark
        if: matrix.build_type == 'Release'
        run: |
          ./build/tests/msgbus_bench | tee benchmark-macos.txt

      - name: Upload benchmark results
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-macos
          path: benchmark-macos.txt
