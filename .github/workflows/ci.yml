name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure --timeout 30

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Release, Debug]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++-13
          else
            sudo apt-get install -y clang-17
          fi

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        build_type: [Release, Debug]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j $(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-13 lcov

      - name: Configure with coverage
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13 -DMSGBUS_COVERAGE=ON -DMSGBUS_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Collect coverage
        run: |
          lcov --capture --directory build --output-file coverage.info --rc branch_coverage=1 --gcov-tool gcov-13 --ignore-errors negative
          lcov --remove coverage.info '/usr/*' '*/googletest/*' '*/gtest/*' --output-file coverage.info --rc branch_coverage=1 --ignore-errors negative
          lcov --list coverage.info --rc branch_coverage=1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.info

  # Single status check for branch protection
  ci-passed:
    needs: [build-windows, build-linux, build-macos, coverage]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.build-windows.result }}" != "success" ] || \
             [ "${{ needs.build-linux.result }}" != "success" ] || \
             [ "${{ needs.build-macos.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
