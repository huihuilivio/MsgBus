name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  benchmark-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --timeout 30

      - name: Benchmark
        run: ./build/tests/Release/msgbus_bench.exe | Tee-Object -FilePath benchmark-windows.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-windows
          path: benchmark-windows.txt

  benchmark-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc-13
            cxx: g++-13
          - compiler: clang
            cc: clang-17
            cxx: clang++-17
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            sudo apt-get install -y g++-13
          else
            sudo apt-get install -y clang-17
          fi

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Benchmark
        run: |
          ./build/tests/msgbus_bench | tee benchmark-linux-${{ matrix.compiler }}.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-linux-${{ matrix.compiler }}
          path: benchmark-linux-${{ matrix.compiler }}.txt

  benchmark-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -S . -DCMAKE_CXX_STANDARD=20 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j $(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 30

      - name: Benchmark
        run: |
          ./build/tests/msgbus_bench | tee benchmark-macos.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-macos
          path: benchmark-macos.txt

  release:
    needs: [benchmark-windows, benchmark-linux, benchmark-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          merge-multiple: true

      - name: Create source archive
        run: |
          PREFIX="MsgBus-${{ steps.version.outputs.VERSION }}"
          git archive --format=tar.gz --prefix="${PREFIX}/" HEAD -o "${PREFIX}.tar.gz"
          git archive --format=zip --prefix="${PREFIX}/" HEAD -o "${PREFIX}.zip"

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: |
            MsgBus-${{ steps.version.outputs.VERSION }}.tar.gz
            MsgBus-${{ steps.version.outputs.VERSION }}.zip
            benchmark-*.txt
